# AuroraOS update channel configuration (sourced by the upgrade tools).
# Override the defaults here if you host your own update channel.

# Base URL that serves the update manifest + artifacts. The download Worker
# exposes these under /updates (see release.sh and download-proxy).
UPDATE_BASE_URL="https://auroraos-download.rob74752.workers.dev/updates"

# Release channel (manifest lives at ${UPDATE_BASE_URL}/${UPDATE_CHANNEL}/manifest.json).
UPDATE_CHANNEL="stable"
