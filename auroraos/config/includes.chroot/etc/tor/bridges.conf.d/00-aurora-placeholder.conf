# AuroraOS — bridges.conf.d placeholder (DO NOT add directives here)
# =============================================================================
# This comment-only file exists so that the torrc line
#     %include /etc/tor/bridges.conf.d/*.conf
# ALWAYS matches at least one file. That guarantees a plain "Connect to Tor
# (direct)" works no matter how the local tor build treats a wildcard that
# matches nothing — and it keeps working after the user clears their bridges
# (aurora-tor-set-bridges removes only aurora.conf, never this file).
#
# Runtime bridge lines are written by aurora-tor-set-bridges to
#   /etc/tor/bridges.conf.d/aurora.conf
# (Tails-style paste box). They are amnesic — gone on reboot. Do not put any
# Tor directives in THIS file: it is intentionally inert.
