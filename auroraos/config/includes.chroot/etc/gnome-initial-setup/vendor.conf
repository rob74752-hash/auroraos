# AuroraOS — GNOME Initial Setup (first-boot wizard) customization.
#
# Skip the "privacy" page, which is the one carrying the Location Services
# toggle (and the automatic-problem-reporting toggle). AuroraOS has no
# geolocation at all — geoclue is purged and the dconf key is locked off — so
# that page is meaningless; we remove it so it never appears.
#
# NOTE: page-id is the documented GNOME Initial Setup name; verify on first boot
# that the Location step no longer shows.
[pages]
skip=privacy
