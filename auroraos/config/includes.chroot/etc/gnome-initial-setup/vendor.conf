# AuroraOS — GNOME Initial Setup (first-boot wizard) customization.
#
# Skip these wizard pages:
#   * privacy — carries the Location Services toggle (and automatic problem
#     reporting). AuroraOS has no geolocation at all (geoclue is purged and the
#     dconf key is locked off), so the page is meaningless.
#   * goa     — the "Connect your online accounts" page (Google, Microsoft,
#     Nextcloud, …). AuroraOS is built for anonymity; signing into a personal
#     account de-anonymises you, so this step must never be offered. The GOA
#     backend is also purged (95-aurora-cleanup), but the wizard still renders
#     the page header unless we skip it here by page-id.
#
# NOTE: these are the documented GNOME Initial Setup page-ids; verify on first
# boot that neither the Location nor the Online Accounts step shows.
[pages]
skip=privacy;goa
