# AuroraOS — disable NetworkManager's connectivity check.
#
# By default NetworkManager fetches http://network-test.debian.org/... over the
# CLEARNET the instant a connection becomes active, to detect captive portals.
# In Tor mode that request could fire in the brief moment before the kill-switch
# is fully in place and reveal the real IP. We never want this "phone home", so
# we turn it off entirely (the early Tor kill-switch would block it in Tor mode
# anyway; this closes it in every mode).
[connectivity]
enabled=false
