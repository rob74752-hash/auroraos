# AuroraOS — anti-correlation network defaults (Tails-style).
#
# Randomize the MAC address so the local network cannot fingerprint or track the
# device by its hardware MAC (even in Tor mode, the LAN sees layer-2), and do NOT
# send the hostname ("auroraos") to the DHCP server. Users who need a stable MAC
# (e.g. MAC-bound captive portals or registered networks) can override per
# connection in Settings.
[device]
wifi.scan-rand-mac-address=yes

[connection]
wifi.cloned-mac-address=random
ethernet.cloned-mac-address=random
ipv4.dhcp-send-hostname=false
ipv6.dhcp-send-hostname=false
# Do NOT derive the IPv6 interface identifier from the MAC (some NetworkManager
# versions default to eui64, which would re-expose a stable hardware ID and
# defeat MAC randomization). stable-privacy + temporary addresses instead.
ipv6.addr-gen-mode=stable-privacy
ipv6.ip6-privacy=2
